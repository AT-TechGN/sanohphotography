# Routes de l'application SanohPhotography
#
# IMPORTANT : Tous les controllers utilisent des attributs PHP #[Route].
# Le MicroKernelTrait de Symfony les découvre automatiquement.
# Ce fichier ne charge que les routes manuelles (login JWT).

controllers:
    resource: routing.controllers

# Route login JWT (gérée par LexikJWTBundle, pas de controller PHP)
api_login_check:
    path: /api/login
    methods: [POST]
