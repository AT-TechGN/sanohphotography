api_gallery_photos:
    path: /gallery/photos
    controller: App\Controller\Api\GalleryController::getPhotos
    methods: [GET]

api_gallery_featured:
    path: /gallery/featured
    controller: App\Controller\Api\GalleryController::getFeatured
    methods: [GET]

api_gallery_albums:
    path: /gallery/albums
    controller: App\Controller\Api\GalleryController::getAlbums
    methods: [GET]

api_gallery_stats:
    path: /gallery/stats
    controller: App\Controller\Api\GalleryController::getStats
    methods: [GET]

