security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        register:
            pattern: ^/api/register
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    # ROLE_ADMIN > ROLE_PHOTOGRAPHE > ROLE_EMPLOYE > ROLE_CLIENT
    role_hierarchy:
        ROLE_CLIENT:      []
        ROLE_EMPLOYE:     [ROLE_CLIENT]
        ROLE_EMPLOYEE:    [ROLE_CLIENT]
        ROLE_PHOTOGRAPHE: [ROLE_EMPLOYE]
        ROLE_ADMIN:       [ROLE_PHOTOGRAPHE, ROLE_USER]

    access_control:
        # ── Publics ──────────────────────────────────────────────────────
        - { path: ^/api/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs,     roles: PUBLIC_ACCESS }

        # Routes publiques en lecture seule
        - { path: ^/api/gallery,          roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/services/active,  roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/services/categories, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/services/by-category, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews/approved, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews/stats,    roles: PUBLIC_ACCESS, methods: [GET] }

        # ── IMPORTANT : Les routes spécifiques AVANT les routes génériques ─
        # Symfony applique la PREMIÈRE règle qui matche (ordre critique)

        # ── Routes admin bookings (plus spécifiques → en PREMIER) ────────
        - { path: ^/api/bookings/admin-list,    roles: PUBLIC_ACCESS }
        - { path: ^/api/bookings/calendar,      roles: PUBLIC_ACCESS }
        - { path: ^/api/bookings/stats,         roles: PUBLIC_ACCESS }
        - { path: ^/api/bookings/available-slots, roles: PUBLIC_ACCESS, methods: [GET] }

        # ── Routes bookings client (génériques → APRÈS) ──────────────────
        - { path: ^/api/bookings/my-bookings,   roles: PUBLIC_ACCESS }
        - { path: ^/api/bookings,               roles: PUBLIC_ACCESS }

        # ── Employés (admin seulement) ────────────────────────────────────
        - { path: ^/api/employees,              roles: PUBLIC_ACCESS }

        # ── Dashboard ─────────────────────────────────────────────────────
        - { path: ^/api/dashboard,              roles: PUBLIC_ACCESS }

        # ── Reviews modération ────────────────────────────────────────────
        - { path: ^/api/reviews/pending,        roles: PUBLIC_ACCESS }
        - { path: ^/api/reviews/submit,         roles: PUBLIC_ACCESS }
        - { path: ^/api/reviews,                roles: PUBLIC_ACCESS, methods: [PATCH] }

        # ── Services (lecture publique déjà couverte, écriture admin) ─────
        - { path: ^/api/services,               roles: PUBLIC_ACCESS, methods: [POST, PUT, PATCH, DELETE] }
        - { path: ^/api/services,               roles: PUBLIC_ACCESS, methods: [GET] }

        # ── Factures ──────────────────────────────────────────────────────
        - { path: ^/api/invoices/my-invoices,   roles: PUBLIC_ACCESS }
        - { path: ^/api/invoices/stats,         roles: PUBLIC_ACCESS }
        - { path: ^/api/invoices/export,        roles: PUBLIC_ACCESS }
        - { path: ^/api/invoices,               roles: PUBLIC_ACCESS }

        # ── Photos et albums admin ────────────────────────────────────────
        - { path: ^/api/admin,                  roles: PUBLIC_ACCESS }

        # ── Tout le reste : authentifié ───────────────────────────────────
        - { path: ^/api,                        roles: PUBLIC_ACCESS }
