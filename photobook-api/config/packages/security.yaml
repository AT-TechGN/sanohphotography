security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        register:
            pattern: ^/api/register
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    # Hiérarchie : ROLE_ADMIN > ROLE_PHOTOGRAPHE > ROLE_EMPLOYE > ROLE_CLIENT
    role_hierarchy:
        ROLE_CLIENT:      []
        ROLE_EMPLOYE:     [ROLE_CLIENT]
        ROLE_EMPLOYEE:    [ROLE_CLIENT]         # Alias pour compatibilité
        ROLE_PHOTOGRAPHE: [ROLE_EMPLOYE]
        ROLE_ADMIN:       [ROLE_PHOTOGRAPHE, ROLE_USER]

    access_control:
        # ── Publics ───────────────────────────────────────────────────────
        - { path: ^/api/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs,     roles: PUBLIC_ACCESS }
        - { path: ^/api/gallery,  roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/services, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews/approved, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews/stats,    roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/contact,  roles: PUBLIC_ACCESS, methods: [POST] }

        # ── Client ────────────────────────────────────────────────────────
        - { path: ^/api/bookings/my-bookings, roles: ROLE_CLIENT }
        - { path: ^/api/bookings,             roles: ROLE_CLIENT, methods: [POST] }
        - { path: ^/api/invoices/my-invoices, roles: ROLE_CLIENT }
        - { path: ^/api/reviews/submit,       roles: ROLE_CLIENT, methods: [POST] }

        # ── Employé / Photographe ─────────────────────────────────────────
        - { path: ^/api/admin/photos,          roles: ROLE_EMPLOYE }
        - { path: ^/api/admin/albums,          roles: ROLE_EMPLOYE }
        - { path: ^/api/admin/tags,            roles: ROLE_EMPLOYE }
        - { path: ^/api/admin/bookings,        roles: ROLE_EMPLOYE }

        # ── Photographe ───────────────────────────────────────────────────
        - { path: ^/api/bookings/admin-list,   roles: ROLE_PHOTOGRAPHE }
        - { path: ^/api/bookings/calendar,     roles: ROLE_PHOTOGRAPHE }
        - { path: ^/api/bookings/stats,        roles: ROLE_PHOTOGRAPHE }
        - { path: ^/api/dashboard,             roles: ROLE_PHOTOGRAPHE }
        - { path: ^/api/reviews/pending,       roles: ROLE_PHOTOGRAPHE }
        - { path: ^/api/reviews,               roles: ROLE_PHOTOGRAPHE, methods: [PATCH] }
        - { path: ^/api/services,              roles: ROLE_PHOTOGRAPHE, methods: [POST, PUT, PATCH, DELETE] }

        # ── Admin ─────────────────────────────────────────────────────────
        - { path: ^/api/employees,             roles: ROLE_ADMIN }
        - { path: ^/api/invoices,              roles: ROLE_ADMIN, methods: [GET, POST, PATCH] }
        - { path: ^/api/invoices/stats,        roles: ROLE_ADMIN }
        - { path: ^/api/invoices/export,       roles: ROLE_ADMIN }

        # ── Toute API authentifiée ────────────────────────────────────────
        - { path: ^/api/bookings,              roles: ROLE_CLIENT }
        - { path: ^/api,                       roles: IS_AUTHENTICATED_FULLY }
